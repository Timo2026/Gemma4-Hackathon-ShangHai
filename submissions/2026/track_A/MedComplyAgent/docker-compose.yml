services:
  db:
    image: postgres:16-alpine
    container_name: hedis-ai-review-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hedis_ai_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hedis_ai_review"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: hedis-ai-review-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hedis_ai_review
      UPLOAD_STORAGE_DIR: /app/uploads
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: hedis-ai-review-frontend
    depends_on:
      - backend
    environment:
      BACKEND_BASE_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
